<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano Platform - Inclusive Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }
        .high-contrast { 
            background-color: #000 !important; 
            color: #fff !important; 
        }
        .high-contrast button { 
            border: 2px solid white !important; 
            background-color: #000 !important; 
            color: #fff !important; 
        }

        /* Banner */
        .banner {
            background-image: url('Fulfill the Promise of the Individuals with Disabilities Education Act _ NEA.jpg');
            background-size: cover;
            background-position: center;
            height: 520px;
            position: relative;
            width: 100%;
        }
        .banner-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.65));
            position: absolute;
            inset: 0;
        }

        /* Logo as CSS Background - Consistent with Banner */
        .urungano-logo {
            width: 72px;
            height: 72px;
            background-image: url('WhatsApp Image 2026-04-03 at 1.45.18 PM.jpeg');
            background-size: cover;
            background-position: center;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }

        .chat-logo {
            width: 58px;
            height: 58px;
            background-image: url('WhatsApp Image 2026-04-03 at 1.45.18 PM.jpeg');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
        }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Full-Size Banner -->
    <div class="banner">
        <div class="banner-overlay"></div>
        
        <!-- Top Navigation -->
        <nav class="flex justify-between items-center px-8 py-6 relative z-50">
            <!-- Logo Top Left -->
            <div class="urungano-logo"></div>
            
            <!-- Header Buttons - Top Right -->
            <div class="flex gap-4">
                <button onclick="window.location.href='#srh'" 
                        class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl transition shadow-md">
                    SRH Services
                </button>
                <button onclick="window.location.href='#mental'" 
                        class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl transition shadow-md">
                    Mental Health Support
                </button>
                <button onclick="document.getElementById('search-input').focus()" 
                        class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl flex items-center gap-2 transition shadow-md">
                    <span>🔍</span> Search
                </button>
            </div>
        </nav>

        <!-- Welcome Text -->
        <div class="absolute bottom-16 left-1/2 -translate-x-1/2 text-center text-white px-6 max-w-4xl">
            <h1 class="text-6xl font-bold leading-tight mb-6">
                Welcome to Urungano Platform
            </h1>
            <p class="text-2xl text-white/90 max-w-3xl mx-auto">
                Your inclusive, Kinyarwanda-native home for stigma-free support<br>
                in Sexual and Reproductive Health (SRH) and Mental Health.
            </p>
        </div>
    </div>

    <!-- Main Chat Section -->
    <div class="max-w-6xl mx-auto px-6 py-10">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden" style="height: 78vh; min-height: 680px;">
            
            <!-- Chat Header with Logo -->
            <div class="bg-blue-600 px-8 py-6 text-white flex items-center gap-4">
                <div class="chat-logo"></div>
                <div>
                    <h2 class="text-2xl font-bold">Urungano AI Assistant</h2>
                    <p class="text-blue-100">Anonymous • Secure • Real-time Support</p>
                </div>
            </div>

            <!-- Udify Chatbot -->
            <div style="height: calc(100% - 85px);">
                <iframe
                    src="https://udify.app/chat/4c3chgpwFrrgfL4d"
                    style="width: 100%; height: 100%;"
                    frameborder="0"
                    allow="microphone">
                </iframe>
            </div>
        </div>
    </div>

    <!-- Floating Accessibility Controls -->
    <div class="fixed bottom-8 right-8 bg-white shadow-2xl rounded-3xl p-4 flex gap-3 z-50 border border-slate-100">
        <button onclick="toggleContrast()" 
                class="bg-slate-100 hover:bg-slate-200 px-6 py-3 rounded-2xl text-sm font-medium transition">Contrast</button>
        <button onclick="changeFontSize(2)" 
                class="bg-slate-100 hover:bg-slate-200 px-6 py-3 rounded-2xl text-sm font-medium transition">A+</button>
        <button onclick="changeFontSize(-2)" 
                class="bg-slate-100 hover:bg-slate-200 px-6 py-3 rounded-2xl text-sm font-medium transition">A-</button>
    </div>

    <script>
        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
        }
        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta;
            document.body.style.fontSize = currentSize + 'px';
        }
    </script>
</body>
</html>
