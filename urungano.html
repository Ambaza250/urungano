<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI - Ufite Ikibazo? Tugufashe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .chat-container { height: calc(100vh - 75px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">

    <!-- Top Navigation -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-xl">U</div>
            <h1 class="text-2xl font-bold">Urungano AI</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleContrast()" class="px-4 py-2 hover:bg-slate-800 rounded-xl">Contrast</button>
            <button onclick="changeFontSize(2)" class="px-4 py-2 hover:bg-slate-800 rounded-xl">A+</button>
            <button onclick="changeFontSize(-2)" class="px-4 py-2 hover:bg-slate-800 rounded-xl">A-</button>
            <a href="about us.html" class="px-4 py-2 hover:bg-slate-800 rounded-xl">About Us</a>
        </div>
    </nav>

    <!-- Full Screen Chat Area -->
    <div class="chat-container flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-4xl h-full bg-slate-900 rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            
            <!-- Botpress Chat will be injected here -->
            <div id="botpress-webchat" class="h-full"></div>
        </div>
    </div>

    <!-- Botpress Scripts -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/07/18/20260307180448-OO3P5CNL.js" defer></script>

    <script>
        // Accessibility functions
        function toggleContrast() {
            document.documentElement.classList.toggle('high-contrast');
        }
        let fontSize = 16;
        function changeFontSize(delta) {
            fontSize += delta;
            document.body.style.fontSize = fontSize + 'px';
        }

        // Optional: Customize Botpress appearance after it loads
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'BP_WEBCHAT_READY') {
                console.log("Urungano Botpress is ready!");
            }
        });
    </script>
</body>
</html>
