<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #chat-container {
            height: calc(100vh - 120px); /* Adjust if you change header/footer size */
            width: 100%;
        }
        #botpress-webchat {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col">

    <!-- Your header (kept simple) -->
    <header class="bg-blue-600 text-white px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/30 rounded-2xl flex items-center justify-center text-3xl">U</div>
            <h1 class="text-2xl font-bold">Urungano AI</h1>
        </div>
        <p class="text-sm opacity-90">Anonymous & Secure Support</p>
    </header>

    <!-- Botpress Chat Area - This is the main thing now -->
    <div class="flex-1 p-4" id="chat-container">
        <div id="botpress-webchat" class="bg-white rounded-3xl shadow-xl overflow-hidden h-full"></div>
    </div>

    <!-- Optional small footer -->
    <footer class="text-center text-xs text-slate-500 py-4">
        © Urungano AI • Powered by Botpress
    </footer>

    <!-- === Botpress Scripts (keep exactly as you provided) === -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/07/18/20260307180448-OO3P5CNL.js" defer></script>

    <script>
        window.addEventListener('load', () => {
            window.botpressWebChat.init({
                botId: "d59ff866-fc33-4d42-ad6e-456733cd4c00",
                clientId: "9cd9be7e-2f2d-477c-a92f-f01aa46d4dab",
                
                // These options make it embedded, not a widget
                container: "#botpress-webchat",
                hideWidget: true,
                containerWidth: "100%",
                layoutWidth: "100%",

                botName: "Urungano AI",
                showPoweredBy: false,
                enableTranscriptDownload: true,
                
                // Optional: nicer look
                theme: "prism",
                style: {
                    borderRadius: "12px"
                }
            });
        });
    </script>

</body>
</html>
