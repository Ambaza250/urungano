<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano Platform - Inclusive Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .high-contrast { background-color: #000 !important; color: #fff !important; }
        .high-contrast button { border: 2px solid white !important; background-color: #000 !important; color: #fff !important; }

        .banner {
            background-image: url('https://www.nea.org/sites/default/files/2025-06/idea-funding-gaps.jpg'); /* NEA IDEA image */
            background-size: cover;
            background-position: center;
            height: 420px;
            position: relative;
        }
        .banner-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
            position: absolute;
            inset: 0;
        }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Top Banner -->
    <div class="banner">
        <div class="banner-overlay flex items-center">
            <div class="max-w-6xl mx-auto px-6 text-white w-full">
                <div class="flex justify-end gap-3 mb-8">
                    <button onclick="window.location.href='#srh'" 
                            class="bg-white/90 hover:bg-white text-slate-900 font-medium px-6 py-2.5 rounded-full transition">
                        SRH Services
                    </button>
                    <button onclick="window.location.href='#mental'" 
                            class="bg-white/90 hover:bg-white text-slate-900 font-medium px-6 py-2.5 rounded-full transition">
                        Mental Health Support
                    </button>
                    <button onclick="document.getElementById('search-input').focus()" 
                            class="bg-white/90 hover:bg-white text-slate-900 font-medium px-6 py-2.5 rounded-full flex items-center gap-2 transition">
                        <span>🔍</span> Search
                    </button>
                </div>

                <div class="max-w-2xl">
                    <h1 class="text-5xl font-bold leading-tight mb-4">
                        Welcome to Urungano Platform
                    </h1>
                    <p class="text-xl text-white/90">
                        Your inclusive, Kinyarwanda-native home for stigma-free support<br>
                        in Sexual and Reproductive Health (SRH) and Mental Health.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chat Section (Udify Iframe) -->
    <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden" style="height: 82vh; min-height: 680px;">
            
            <!-- Chat Header -->
            <div class="bg-blue-600 px-8 py-5 text-white flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-3xl font-bold">U</div>
                <div>
                    <h2 class="text-2xl font-bold">Urungano AI Assistant</h2>
                    <p class="text-blue-100 text-sm">Anonymous • Secure • Real-time Support</p>
                </div>
            </div>

            <!-- Udify Chatbot Iframe -->
            <div style="height: calc(100% - 77px);">
                <iframe
                    src="https://udify.app/chat/4c3chgpwFrrgfL4d"
                    style="width: 100%; height: 100%;"
                    frameborder="0"
                    allow="microphone">
                </iframe>
            </div>
        </div>
    </div>

    <!-- Accessibility Controls (Floating) -->
    <div class="fixed bottom-6 right-6 bg-white shadow-lg rounded-2xl p-3 flex gap-2 z-50">
        <button onclick="toggleContrast()" 
                class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl text-sm font-medium transition">
            Contrast
        </button>
        <button onclick="changeFontSize(2)" 
                class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl text-sm font-medium transition">
            A+
        </button>
        <button onclick="changeFontSize(-2)" 
                class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl text-sm font-medium transition">
            A-
        </button>
    </div>

    <script>
        // Accessibility
        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
        }
        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta;
            document.body.style.fontSize = currentSize + 'px';
        }
    </script>
</body>
</html>
