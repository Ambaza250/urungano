<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI - Ufite Ikibazo? Tugufashe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        #botpress-container {
            height: calc(100vh - 75px);
        }
        #webchat {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">

    <!-- Top Navigation -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-xl">U</div>
            <h1 class="text-2xl font-bold">Urungano AI</h1>
        </div>
        <div class="flex gap-4 text-sm">
            <button onclick="toggleContrast()" class="px-4 py-2 hover:bg-slate-800 rounded-xl">Contrast</button>
            <button onclick="changeFontSize(2)" class="px-4 py-2 hover:bg-slate-800 rounded-xl">A+</button>
            <button onclick="changeFontSize(-2)" class="px-4 py-2 hover:bg-slate-800 rounded-xl">A-</button>
            <a href="about us.html" class="px-4 py-2 hover:bg-slate-800 rounded-xl">About Us</a>
        </div>
    </nav>

    <!-- Botpress Chat Container -->
    <div id="botpress-container" class="px-4 pt-4 max-w-5xl mx-auto">
        <div id="webchat"></div>
    </div>

    <!-- Botpress Scripts -->
    <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
    <script>
        // Initialize Botpress - This is the most important part
        window.botpressWebChat.init({
            botId: "YOUR_BOT_ID_HERE",           // ← Replace this
            clientId: "YOUR_CLIENT_ID_HERE",     // ← Replace this
            botName: "Urungano AI",
            containerWidth: "100%",
            layoutWidth: "100%",
            hideWidget: true,
            disableAnimations: false,
            theme: "dark",
            themeName: "prism"
        });

        // Accessibility functions
        function toggleContrast() {
            document.documentElement.classList.toggle('high-contrast');
        }
        let fontSize = 16;
        function changeFontSize(delta) {
            fontSize += delta;
            document.body.style.fontSize = fontSize + 'px';
        }
    </script>
</body>
</html>
