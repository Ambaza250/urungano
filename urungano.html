<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI - Inclusive Health Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents double scrollbars */
        }
        #main-container {
            height: calc(100vh - 64px); /* Subtract header height */
        }
        #botpress-webchat {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white px-6 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-2xl font-bold">U</div>
            <div>
                <h1 class="text-2xl font-bold">Urungano AI</h1>
                <p class="text-xs text-blue-100">Anonymous • Secure • Kinyarwanda & English</p>
            </div>
        </div>
        <div class="flex gap-3 text-sm">
            <button onclick="toggleContrast()" class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg transition">Contrast</button>
            <button onclick="changeFontSize(2)" class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg transition">A+</button>
            <button onclick="changeFontSize(-2)" class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg transition">A-</button>
        </div>
    </header>

    <!-- BOTPRESS CHAT - FULL MAIN AREA -->
    <div id="main-container" class="flex-1 bg-white">
        <div id="botpress-webchat"></div>
    </div>

    <!-- FOOTER (small) -->
    <footer class="bg-slate-800 text-slate-400 text-xs py-3 text-center">
        © 2026 Urungano AI • iAccelerator Phase 7 • Your privacy is protected
    </footer>

    <!-- Botpress Scripts -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/07/18/20260307180448-OO3P5CNL.js" defer></script>

    <script>
        // Accessibility functions
        function toggleContrast() {
            document.documentElement.classList.toggle('high-contrast');
        }
        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta;
            document.body.style.fontSize = currentSize + 'px';
        }

        // Initialize Botpress as full embedded chat (no widget)
        window.addEventListener('load', function() {
            window.botpressWebChat.init({
                botId: "d59ff866-fc33-4d42-ad6e-456733cd4c00",
                clientId: "9cd9be7e-2f2d-477c-a92f-f01aa46d4dab",
                container: "#botpress-webchat",
                hideWidget: true,
                width: "100%",
                height: "100%",
                botName: "Urungano AI",
                showPoweredBy: false,
                enableTranscriptDownload: true,
                theme: "prism",           // You can change to "galaxy" or others later
                style: {
                    borderRadius: "0px",
                    boxShadow: "none"
                }
            });
        });
    </script>

</body>
</html>
