<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI - Inclusive Health Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
        }
        .high-contrast { 
            background-color: #000 !important; 
            color: #fff !important; 
        }
        .high-contrast button { 
            border: 2px solid white !important; 
            background-color: #000 !important; 
            color: #fff !important; 
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .chat-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            height: 82vh;
            min-height: 650px;
        }

        .chat-header {
            background: #2563eb;
            color: white;
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .iframe-wrapper {
            height: calc(100% - 77px);
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Top Navigation + Accessibility -->
    <nav class="bg-white shadow-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">Urungano AI</h1>
        <div class="flex gap-3">
            <button onclick="toggleContrast()" class="bg-slate-100 px-4 py-1.5 rounded-lg text-sm font-medium">Contrast</button>
            <button onclick="changeFontSize(2)" class="bg-slate-100 px-4 py-1.5 rounded-lg text-sm font-medium">A+</button>
            <button onclick="changeFontSize(-2)" class="bg-slate-100 px-4 py-1.5 rounded-lg text-sm font-medium">A-</button>
        </div>
    </nav>

    <div class="main-container">
        
        <!-- Hero (kept small since chat is now main) -->
        <div class="text-center py-8">
            <h2 class="text-4xl font-extrabold mb-3 text-slate-800">Ufite Ikibazo? Urungano AI ruragutega amatwi.</h2>
            <p class="text-slate-600 max-w-2xl mx-auto">Your safe, anonymous, and inclusive bridge to SRH and Mental Health support in Rwanda.</p>
        </div>

        <!-- Main Chat Card -->
        <div class="chat-card">
            
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-3xl font-bold">U</div>
                    <div>
                        <h3 class="font-bold text-xl">Urungano AI Assistant</h3>
                        <p class="text-blue-100 text-sm">Anonymous • Secure • Always Here</p>
                    </div>
                </div>
            </div>

            <!-- Iframe - The Main Thing -->
            <div class="iframe-wrapper">
                <iframe
                    src="https://udify.app/chat/4c3chgpwFrrgfL4d"
                    frameborder="0"
                    allow="microphone">
                </iframe>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-slate-400 text-xs py-8 mt-6">
            © 2026 Urungano AI | iAccelerator Phase 7 Prototype
        </footer>
    </div>

    <script>
        // Accessibility Controls
        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
        }

        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta;
            document.body.style.fontSize = currentSize + 'px';
        }
    </script>
</body>
</html>
