<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano AI - Inclusive Health Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Botpress Embed Scripts -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/07/18/20260307180448-OO3P5CNL.js" defer></script>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #botpress-frame {
            height: calc(100vh - 128px); /* Header + Footer space */
            width: 100%;
            border: none;
        }
        .bp-widget-side {
            position: relative !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            max-height: none !important;
        }
        /* Hide default floating button */
        .bp-widget-button {
            display: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col">

<!-- ==================== ZAMUKA HEADER ==================== -->
<header class="bg-white shadow-md sticky top-0 z-50 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-bold text-blue-600">ZAMUKA</div>
        <nav class="flex gap-8 text-sm font-medium">
            <a href="about us.html" class="hover:text-blue-600">About Us</a>
            <a href="Login.html" class="hover:text-blue-600">Log in</a>
            <a href="#" class="hover:text-blue-600">Our Program</a>
            <a href="#" class="hover:text-blue-600">Financial Academy</a>
            <a href="#" class="hover:text-blue-600">Contact</a>
        </nav>
    </div>
</header>

<!-- ==================== FULL SCREEN URUNGANO AI ==================== -->
<div class="flex-1 w-full" id="botpress-frame">
    <!-- Botpress Webchat will be injected here as full screen -->
	<div id="bp-embedded-webchat"></div>
	
    
    
</div>

<!-- ==================== ZAMUKA FOOTER ==================== -->
<footer class="bg-white border-t py-6 text-center text-slate-500 text-sm">
    <div class="max-w-6xl mx-auto px-6">
        <p>© 2026 Zamuka Youth Platform | Urungano AI - Inclusive Health Support for Rwandan Youth</p>
        <p class="text-xs mt-2">All conversations are private and anonymous • Not a substitute for professional medical advice</p>
    </div>
</footer>

<script>
// Force Botpress to open in full screen mode after loading
window.addEventListener('load', function() {
    setTimeout(() => {
        if (window.botpressWebChat) {
            window.botpressWebChat.open();
        }
    }, 800);
});
</script>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/03/07/18/20260307180448-OO3P5CNL.js" defer></script>

</body>
</html>
