<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Zamuka Youth Platform</title>
  <style>
    /* Reuse same styles as login for consistency */
    :root {
      --primary: #0066cc;
      --primary-dark: #0055b3;
      --light: #f8f9fa;
      --gray: #6c757d;
      --dark: #1a1a1a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      padding: 40px 32px;
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.8rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.6rem;
      color: var(--dark);
    }

    .form-group {
      margin-bottom: 1.4rem;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
    }

    .checkbox {
      margin: 1.2rem 0;
      font-size: 0.95rem;
      color: #555;
      text-align: left;
    }

    .checkbox input {
      margin-right: 8px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .toggle-link {
      margin-top: 1.6rem;
      color: var(--gray);
    }

    .toggle-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .toggle-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-container { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo">Zamuka</div>
    <h1>Create Your Account</h1>

    <form>
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" placeholder="Your full name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+250 7XX XXX XXX" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm password" required />
      </div>

      <div class="checkbox">
        <input type="checkbox" id="terms" required />
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="toggle-link">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

</body>
</html>
